spring.application.name=transaction-service

server.port=8085
# 1. On DESACTIVE temporairement l'importation depuis le serveur de configuration
# spring.config.import=optional:configserver:http://localhost:8080
spring.cloud.config.enabled=false

# 2. On FORCE la connexion PostgreSQL en local (Port 5433 de Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/transaction_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Configuration Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8081/eureka/

