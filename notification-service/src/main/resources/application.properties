spring.application.name=notification-service
spring.cloud.config.uri=http://localhost:8080
spring.config.import=optional:configserver:
spring.datasource.url=jdbc:postgresql://localhost:5433/notification_db
spring.datasource.username=postgres
spring.datasource.password=postgres
server.port=8087

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.rabbit.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false

# Africa's Talking SMS.
# Sandbox credentials use AFRICASTALKING_USERNAME=sandbox and the sandbox API key.
# For production, use your production username, API key and https://api.africastalking.com/version1/messaging.
africastalking.enabled=${AFRICASTALKING_ENABLED:true}
africastalking.username=${AFRICASTALKING_USERNAME:sandbox}
africastalking.api-key=${AFRICASTALKING_API_KEY:}
africastalking.from=${AFRICASTALKING_FROM:}
africastalking.sms-url=${AFRICASTALKING_SMS_URL:https://api.sandbox.africastalking.com/version1/messaging}
